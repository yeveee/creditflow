version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: creditflow-postgres
    environment:
      POSTGRES_DB: creditflow
      POSTGRES_USER: creditflow_user
      POSTGRES_PASSWORD: creditflow_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditflow_user -d creditflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: