# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/creditflow
spring.datasource.username=creditflow_user
spring.datasource.password=creditflow_pass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8080

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.scoring.sliding-window-size=5
resilience4j.circuitbreaker.instances.scoring.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.scoring.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.scoring.permitted-number-of-calls-in-half-open-state=3